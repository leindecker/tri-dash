services:
  app:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ./:/app:cached
      - /app/node_modules
    env_file:
      - .env.local
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - APP_URL=http://localhost:3000
      - ALLOWED_DEV_ORIGINS=127.0.0.1,::1
    command: sh -c "npm install --silent || true && npm run dev -- -H 0.0.0.0"
