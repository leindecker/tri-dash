name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      skip_export:
        description: 'Skip static export and Pages deploy (true/false)'
        required: false
        default: 'false'
      image_tag:
        description: 'Tag for the Docker image (optional). Default: latest'
        required: false
        default: 'latest'

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
    env:
      SESSION_SECRET: ${{ secrets.SESSION_SECRET }}
      STRAVA_CLIENT_ID: ${{ secrets.STRAVA_CLIENT_ID }}
      STRAVA_CLIENT_SECRET: ${{ secrets.STRAVA_CLIENT_SECRET }}
      APP_URL: ${{ secrets.APP_URL }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.14.0'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Build Docker image
        run: |
          IMAGE_TAG=${{ github.event.inputs.image_tag || 'latest' }}
          docker build -f Dockerfile.prod -t ghcr.io/${{ github.repository_owner }}/tri-dash:${IMAGE_TAG} .

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push image to GHCR
        run: |
          IMAGE_TAG=${{ github.event.inputs.image_tag || 'latest' }}
          docker push ghcr.io/${{ github.repository_owner }}/tri-dash:${IMAGE_TAG}

  export-and-deploy-pages:
    if: ${{ github.event.inputs.skip_export != 'true' }}
    runs-on: ubuntu-latest
    needs: build-and-publish
    env:
      SESSION_SECRET: ${{ secrets.SESSION_SECRET }}
      STRAVA_CLIENT_ID: ${{ secrets.STRAVA_CLIENT_ID }}
      STRAVA_CLIENT_SECRET: ${{ secrets.STRAVA_CLIENT_SECRET }}
      APP_URL: ${{ secrets.APP_URL }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.14.0'

      - name: Install deps
        run: npm ci

      - name: Static export
        run: |
          # next export only works for fully static apps; server APIs won't be included
          npm run build
          npm run export

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./out

